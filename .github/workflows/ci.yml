name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      translation_only: ${{ steps.check.outputs.translation_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1)
          fi

          TRANSLATION_ONLY="true"
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              src/locales/*) ;;
              *) TRANSLATION_ONLY="false"; break ;;
            esac
          done <<< "$CHANGED"

          echo "translation_only=$TRANSLATION_ONLY" >> $GITHUB_OUTPUT

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}

      - run: npm install -g yarn
      - run: yarn install

      - run: node scripts/validate-l10n.js
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test --coverage

  build-android:
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    if: needs.detect-changes.outputs.translation_only != 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}

      - run: npm install -g yarn
      - run: yarn install

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 🔐 Keystore الحقيقي من Secrets
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ملفات البيئة (كما هي عندك)
      - name: Create .env
        run: |
          cat > .env << 'EOL'
          FIREBASE_FUNCTIONS_URL=https://dummy-url.com
          SUPABASE_URL=https://dummy.supabase.co
          SUPABASE_ANON_KEY=dummy
          EOL

      # 🔥 Build APK + AAB
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease

      # 📦 رفع كل المخرجات
      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

  build-ios:
    runs-on: macos-15
    needs: [build-and-test, detect-changes]
    if: needs.detect-changes.outputs.translation_only != 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}

      - run: npm install -g yarn
      - run: yarn install

      - run: |
          cd ios
          pod install

      - run: gem install xcpretty

      - run: |
          cd ios
          set -o pipefail && xcodebuild \
            -workspace PocketPal.xcworkspace \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
